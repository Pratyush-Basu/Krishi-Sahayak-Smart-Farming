<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — Krishi-Sahayak</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/log.css') }}" />
</head>

<body>

<script>
    window.FIREBASE_CONFIG = {{ firebase_config | tojson }};
</script>

<div class="background">
    <div class="login-container">
        <h2>Forgot Password</h2>

        <p style="text-align:center; color:#555; margin-bottom:20px; font-size:0.9em;">
            Enter your email and we'll send a password reset link.
        </p>

        <form id="forgotForm">
            <div class="input-group">
                <label>Email</label>
                <input
                    type="email"
                    id="resetEmail"
                    required
                    placeholder="Enter your email"
                />
            </div>

            <button type="submit" id="resetBtn">
                Send Reset Link
            </button>
        </form>

        <p class="register-link">
            Remember your password?
            <a href="{{ url_for('auth.login') }}">Login</a>
        </p>
    </div>
</div>

<script type="module">
import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getAuth,
    sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseApp = initializeApp(window.FIREBASE_CONFIG);
const auth = getAuth(firebaseApp);

document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('resetEmail').value;
    const btn = document.getElementById('resetBtn');

    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {

        await sendPasswordResetEmail(auth, email);

        Swal.fire({
            icon: 'success',
            title: 'Reset Email Sent',
            text: `Check your inbox at ${email} for the reset link.`,
        }).then(() => {
            window.location.href = "{{ url_for('auth.login') }}";
        });

    } catch (error) {

        Swal.fire('Error', error.message, 'error');

        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
    }
});
</script>

</body>
</html>
